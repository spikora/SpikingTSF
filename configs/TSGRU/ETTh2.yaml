# TSGRU — ETTh2 configuration
# Best params from Optuna search (100 trials, trial 89, val_mae=0.43741)
# TSGRU = SpikGRU with LIFNode replaced by TSLIFNode (arXiv:2503.05108)

model: TSGRU
data: ETTh2
data_path: ETTh2.csv
features: M
target: OT
root_path: ./datasets/long/
checkpoints: exp/run_ETT/

# Forecasting window
seq_len: 96
label_len: 0
# pred_len is swept in the shell script

# SNN architecture
T: 4
tau: 1.0851557734647734
levels: 1
alpha: 64
encoder_type: delta
pe_type: none
pe_mode: add

# Training
lr: 0.004906338023067461
batch_size: 32
weight_decay: 0.0008941448012411763
grad_clip: 5.0
scheduler: none
scheduler_T_max: 75
scheduler_step: 50
scheduler_gamma: 0.5
train_epochs: 300
patience: 15
loss: mae
optimizer: Adam

# Multi-run — seeds [42, 1234, 3407] used automatically when itr > 1
itr: 3
num_workers: 4
save: 0
gpu: 0
