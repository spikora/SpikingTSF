# SpikGRU — ETTh2 configuration
# Best params from Optuna search (100 trials, trial 20, val_mae=0.43767)

model: SpikGRU
data: ETTh2
data_path: ETTh2.csv
features: M
target: OT
root_path: ./datasets/long/
checkpoints: exp/run_ETT/

# Forecasting window
seq_len: 96
label_len: 0
# pred_len is swept in the shell script

# SNN architecture
T: 4
tau: 1.2791551285336131
levels: 2
alpha: 256
encoder_type: conv
pe_type: none
pe_mode: add

# Training
lr: 0.004687551265274829
batch_size: 32
weight_decay: 0.00033236764537473783
grad_clip: 0.0
scheduler: none
scheduler_T_max: 75
scheduler_step: 50
scheduler_gamma: 0.5
train_epochs: 300
patience: 15
loss: mae
optimizer: Adam

# Multi-run — seeds [42, 1234, 3407] used automatically when itr > 1
itr: 3
num_workers: 4
save: 0
gpu: 0
