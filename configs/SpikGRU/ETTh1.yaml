# SpikGRU — ETTh1 configuration
# Best params from Optuna search (100 trials, trial 48, val_mae=0.91866)

model: SpikGRU
data: ETTh1
data_path: ETTh1.csv
features: M
target: OT
root_path: ./datasets/long/
checkpoints: exp/run_ETT/

# Forecasting window
seq_len: 96
label_len: 0
# pred_len is swept in the shell script

# SNN architecture
T: 4
tau: 3.149666943742141
levels: 1
alpha: 128
encoder_type: delta
pe_type: conv
pe_mode: add

# Training
lr: 0.004841718080373416
batch_size: 32
weight_decay: 0.00025005659370460736
grad_clip: 1.0
scheduler: cosine
scheduler_T_max: 75
scheduler_step: 50
scheduler_gamma: 0.5
train_epochs: 300
patience: 15
loss: mae
optimizer: Adam

# Multi-run — seeds [42, 1234, 3407] used automatically when itr > 1
itr: 3
num_workers: 4
save: 0
gpu: 0
