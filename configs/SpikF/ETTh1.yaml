# SpikF — ETTh1 configuration

model: SpikF
data: ETTh1
data_path: ETTh1.csv
features: M
target: OT
root_path: ./datasets/long/
checkpoints: exp/run_ETT/

# Forecasting window
seq_len: 96
label_len: 48
# pred_len is swept in the shell script

# SNN core
T: 16
tau: 2.0
alpha: 2.0       

# SpikF architecture
levels: 1
patch_num: 48
patch_dim: 32
hidden_dim: 720

# Training
batch_size: 32
lr: 5.0e-4
train_epochs: 5
patience: 3
loss: mae
optimizer: Adam
scheduler: cosine
scheduler_T_max: 20

# Multi-run — seeds [42, 1234, 3407] are used automatically when itr > 1
itr: 3
num_workers: 1
save: 0
gpu: 0
