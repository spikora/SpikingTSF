# TSFormer — ETTh1 configuration
# Best params from Optuna search (100 trials, trial 84, val_mae=0.76609)

model: TSFormer
data: ETTh1
data_path: ETTh1.csv
features: M
target: OT
root_path: ./datasets/long/
checkpoints: exp/run_ETT/

# Forecasting window
seq_len: 96
label_len: 0


# SNN architecture
T: 4
tau: 1.8452705998528411
levels: 2
alpha: 128              # d_model inside exp_ETT
encoder_type: conv

# Fixed architecture 
n_heads: 8
common_thr: 1.0
qk_scale: 0.125
# d_ff omitted -> auto = d_model x 4 = 512

# Training
lr: 0.003824798473063481
batch_size: 128
weight_decay: 0.00024589105116978464
grad_clip: 0.0
scheduler: cosine
scheduler_T_max: 75
scheduler_step: 50
scheduler_gamma: 0.5
train_epochs: 300
patience: 15
loss: mae
optimizer: Adam

# Multi-run — seeds [42, 1234, 3407] used automatically when itr > 1
itr: 3
num_workers: 4
save: 0
gpu: 0
